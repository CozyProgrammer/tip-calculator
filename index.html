<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tip Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>Tip Calculator</h1>

    <div class="input-group">
      <label>Bill Amount (Rs)</label>
      <input type="number" id="bill" placeholder="e.g. 1500">
      <span class="error" id="bill-error"></span>
    </div>

    <div class="input-group">
      <label>Tip %</label>
      <div class="tip-presets">
        <button class="preset" data-value="10">10%</button>
        <button class="preset" data-value="15">15%</button>
        <button class="preset" data-value="20">20%</button>
      </div>
      <input type="number" id="tip" placeholder="Custom %">
      <span class="error" id="tip-error"></span>
    </div>

    <div class="input-group">
      <label>Number of People</label>
      <input type="number" id="people" placeholder="e.g. 4">
      <span class="error" id="people-error"></span>
    </div>

    <button id="reset">Reset</button>

    <div class="results">
      <div class="result-item">
        <span>Total Tip</span>
        <span id="total-tip">Rs 0.00</span>
      </div>
      <div class="result-item">
        <span>Grand Total</span>
        <span id="grand-total">Rs 0.00</span>
      </div>
      <div class="result-item">
        <span>Per Person</span>
        <span id="per-person">Rs 0.00</span>
      </div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
